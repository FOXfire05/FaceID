service: attendance-backend
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 512
  timeout: 30
  environment:
    MONGODB_URI: ${env:MONGODB_URI}
    AWS_S3_REGION: ${env:AWS_S3_REGION}
    AWS_S3_BUCKET_NAME: ${env:AWS_S3_BUCKET_NAME}
    REKOGNITION_COLLECTION_ID: ${env:REKOGNITION_COLLECTION_ID}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:*
            - rekognition:*
          Resource: "*"

plugins:
  - serverless-esbuild
  - serverless-apigw-binary
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    exclude:
      - aws-sdk
    external:
      - sharp
      - mongoose
      - express
      - multer
      - cors
    packagerOptions:
      scripts:
        - npm install --force --os=linux --cpu=x64 sharp
  serverless-offline:
    httpPort: 5000
    noPrependStageInUrl: true
  apigwBinary:
    types:
      - 'multipart/form-data'
      - 'image/jpeg'
      - 'image/png'
      - '*/*'

functions:
  api:
    handler: server.handler
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
